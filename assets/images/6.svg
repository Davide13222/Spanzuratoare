<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <rect x="30" y="200" width="100" height="12" rx="4" fill="#8B5E3C" stroke="#3d2b1a" stroke-width="2.5"/>
  <rect x="55" y="30" width="10" height="172" rx="4" fill="#A0724A" stroke="#3d2b1a" stroke-width="2.5"/>
  <rect x="55" y="30" width="100" height="10" rx="4" fill="#A0724A" stroke="#3d2b1a" stroke-width="2.5"/>
  <rect x="35" y="185" width="8" height="20" rx="3" fill="#8B5E3C" stroke="#3d2b1a" stroke-width="2" transform="rotate(-35, 39, 195)"/>
  <line x1="148" y1="40" x2="148" y2="80" stroke="#D4B896" stroke-width="4" stroke-linecap="round"/>
  <circle cx="148" cy="88" r="10" fill="none" stroke="#D4B896" stroke-width="3.5"/>
  <!-- HEAD -->
  <circle cx="148" cy="98" r="16" fill="#FFDAB9" stroke="#3d2b1a" stroke-width="2.5"/>
  <line x1="137" y1="90" x2="145" y2="98" stroke="#3d2b1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="90" x2="137" y2="98" stroke="#3d2b1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="151" y1="90" x2="159" y2="98" stroke="#3d2b1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="159" y1="90" x2="151" y2="98" stroke="#3d2b1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tongue sticking out -->
  <ellipse cx="148" cy="110" rx="3" ry="3" fill="#FF6B6B" stroke="#3d2b1a" stroke-width="1.5"/>
  <!-- BODY -->
  <line x1="148" y1="114" x2="148" y2="155" stroke="#3d2b1a" stroke-width="3" stroke-linecap="round"/>
  <rect x="134" y="116" width="28" height="32" rx="6" fill="#4A90D9" stroke="#3d2b1a" stroke-width="2.5"/>
  <!-- LEFT ARM -->
  <line x1="148" y1="125" x2="120" y2="108" stroke="#3d2b1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="118" cy="106" r="6" fill="#FFDAB9" stroke="#3d2b1a" stroke-width="2"/>
  <!-- RIGHT ARM -->
  <line x1="148" y1="125" x2="176" y2="108" stroke="#3d2b1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="178" cy="106" r="6" fill="#FFDAB9" stroke="#3d2b1a" stroke-width="2"/>
  <!-- LEFT LEG -->
  <line x1="148" y1="155" x2="130" y2="185" stroke="#3d2b1a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="126" cy="188" rx="8" ry="5" fill="#E85D3A" stroke="#3d2b1a" stroke-width="2"/>
  <!-- RIGHT LEG -->
  <line x1="148" y1="155" x2="166" y2="185" stroke="#3d2b1a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="170" cy="188" rx="8" ry="5" fill="#E85D3A" stroke="#3d2b1a" stroke-width="2"/>
  <!-- Stars around head (dizzy/dead) -->
  <text x="120" y="70" font-size="12" fill="#E8B84B" stroke="#3d2b1a" stroke-width="0.5">✦</text>
  <text x="168" y="72" font-size="10" fill="#E8B84B" stroke="#3d2b1a" stroke-width="0.5">✦</text>
  <text x="132" y="62" font-size="8" fill="#E8B84B" stroke="#3d2b1a" stroke-width="0.5">✧</text>
</svg>