<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Spanzuratoare</title>
        <link rel="stylesheet" href="assets/css/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Bun venit la Spanzuratoare!</h1>
            <div class="game-settings">
                <h2>Setari joc</h2>       
                <label for="difficulty">Alege dificultatea:</label>
                <select id="difficulty">
                    <option value="easy">Usor</option>
                    <option value="medium">Mediu</option>
                    <option value="hard">Greu</option>
                </select>
                <br>
                <label for="input-word" >Introdu un cuvant (optional):</label>
                <input type="password" id="input-word" placeholder="Cuvantul tau">
                <br>
                <label for="category">Alege categoria:</label>
                <select id="category">
                    <option value="animals">Animale</option>
                    <option value="fruits">Fructe</option>
                    <option value="countries">Tari</option>
                </select>
                <br>
                <button id="start-game">Incepe jocul</button>         
            </div>
            <div class="game-container hidden">
                <h2>Jocul a inceput!</h2>
                <img id="hangman-image" src="images/*hangman0.png" alt="Hangman Image">
                <p id="word-display">Cuvantul: </p>
                <p id="lives-display">Vieti ramase: </p>
                <p>Litere gresite: <span id="wrong-letters"></span></p>
                <p id="game-message"></p>
                <div id="letter-buttons"></div>
                <button id="restart-game">Reincepe jocul</button>
            </div>
            <div class="game-over hidden">
                <h2>Jocul s-a terminat!</h2>
                <p id="final-message"></p>
                <button id="play-again">Joaca din nou</button>
                <button id="close-game">Inchide jocul</button>
            </div>
        </div>             
    </body>
    <script src="assets/js/script.js"></script>
</html>
